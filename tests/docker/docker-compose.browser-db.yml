services:
  db:
    image: mysql:8.0
    container_name: mandate-browser-db
    environment:
      MYSQL_ROOT_PASSWORD: testpass
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    volumes:
      - wpm-browser-db:/var/lib/mysql
    networks:
      - browser-shared
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ptestpass"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  wpm-browser-db:

networks:
  browser-shared:
    name: mandate-browser-tests
