services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: wordpress
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    volumes:
      - wpm-plugin-check-db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql -h localhost -uroot -ptestpass -e 'USE wordpress; SELECT 1;' >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  wp-cli:
    image: wordpress:cli-php8.2
    user: "0:0"
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: testpass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
    volumes:
      - wpm-plugin-check-wp:/var/www/html
      - ../../../../../Libraries/wordpress:/wordpress-src:ro
      - type: bind
        source: ${WPM_PLUGIN_CHECK_PACKAGE_DIR:?WPM_PLUGIN_CHECK_PACKAGE_DIR must be set}
        target: /var/www/html/wp-content/plugins/mandate
        read_only: true
      - ../../:/app:ro

volumes:
  wpm-plugin-check-db:
  wpm-plugin-check-wp:
