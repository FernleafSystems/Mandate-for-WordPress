services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: wordpress
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    volumes:
      - aps-browser-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ptestpass"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  wordpress:
    image: wordpress:php8.2-apache
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: testpass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
    ports:
      - "${APS_BROWSER_PORT:-8898}:80"
    volumes:
      - aps-browser-wp:/var/www/html
      - ../../:/var/www/html/wp-content/plugins/application-password-scoper

  wp-cli:
    image: wordpress:cli-php8.2
    user: "0:0"
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: testpass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_ENVIRONMENT_TYPE', 'local' );
    volumes:
      - aps-browser-wp:/var/www/html
      - ../../../../../Libraries/wordpress:/wordpress-src:ro
      - ../../:/var/www/html/wp-content/plugins/application-password-scoper
      - ../../:/app

volumes:
  aps-browser-db:
  aps-browser-wp:
